<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Koleksiyon — MUKANTARA</title>
<link rel="icon" href="assets/logo/mark.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@500;600;700&family=Cinzel:wght@500;600;700&family=IBM+Plex+Sans:wght@400;500;600&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="assets/brand.css?v=2">
<style>
  .page-hero{padding:160px 0 60px; border-bottom:1px solid var(--hairline);}
  .breadcrumb{font-family:'JetBrains Mono', monospace; font-size:12px; letter-spacing:0.08em; text-transform:uppercase; color:var(--label); margin-bottom:18px;}
  .breadcrumb a{color:var(--brass-light); text-decoration:none;}
  .page-hero h1{font-family:'Sora', sans-serif; font-weight:600; font-size:clamp(30px,5vw,48px); margin:0 0 14px;}
  .page-hero p{max-width:600px; color:var(--ink-dim); font-size:16px; margin:0;}
  .product-grid{display:grid; grid-template-columns:repeat(3, 1fr); gap:1px; background:var(--hairline); border:1px solid var(--hairline); margin:60px 0;}
  .p-card{background:var(--bg); text-decoration:none; color:var(--ink); display:flex; flex-direction:column;}
  .p-card:hover{background:var(--bg-panel-2);}
  .p-card .img-wrap{aspect-ratio:1/1; background:var(--bg-panel); overflow:hidden;}
  .p-card .img-wrap img{width:100%; height:100%; object-fit:cover; display:block;}
  .p-icon{width:100%; height:100%; display:flex; align-items:center; justify-content:center;}
  .p-icon svg{width:30%; height:30%; stroke:var(--brass); fill:none; stroke-width:1.3;}
  .p-body{padding:20px 22px 24px;}
  .p-body h3{font-family:'Sora', sans-serif; font-size:17px; font-weight:600; margin:0 0 6px;}
  .p-body p{font-size:12px; color:var(--ink-dim); margin:0; font-family:'JetBrains Mono', monospace; letter-spacing:0.04em;}
  @media (max-width:860px){ .product-grid{grid-template-columns:1fr 1fr;} }
  @media (max-width:560px){ .product-grid{grid-template-columns:1fr;} }
  .empty-note{text-align:center; padding:60px 0; color:var(--label); font-family:'JetBrains Mono', monospace; font-size:13px;}
</style>
</head>
<body>
<header>
  <div class="navbar">
    <a href="index.html" class="wordmark"><img src="assets/logo/mark.png" alt="Mukantara" onerror="this.style.display='none'"> MUKANTARA</a>
    <div class="navlinks">
      <a href="index.html#koleksiyon">Koleksiyon</a>
      <a href="index.html#manifesto">Manifesto</a>
      <a href="index.html#iletisim" class="cta-link">Teklif Al</a>
    </div>
  </div>
</header>
<section class="page-hero">
  <div class="wrap">
    <div class="breadcrumb"><a href="index.html">Ana Sayfa</a> / <span id="catName">Koleksiyon</span></div>
    <h1 id="catTitle">Koleksiyon</h1>
    <p id="catDesc"></p>
  </div>
</section>
<section style="padding-top:0;">
  <div class="wrap"><div class="product-grid" id="productGrid"></div></div>
</section>
<footer>
  <div class="wrap foot-inner">
    <span class="foot-word">MUKANTARA</span>
    <span class="foot-meta">Tarihi Bilimsel Aletlerin Yeniden Üretimi</span>
    <span class="foot-meta">© 2026 Mukantara</span>
  </div>
</footer>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="assets/shared.js?v=2"></script>
<script>
async function init(){
  const params = new URLSearchParams(location.search);
  const slug = params.get('slug');
  const grid = document.getElementById('productGrid');
  if (!slug) { grid.innerHTML = '<div class="empty-note">Kategori bulunamadı</div>'; return; }
  const { data: cat, error: catErr } = await sb.from('mukantara_categories').select('*').eq('slug', slug).maybeSingle();
  if (catErr || !cat) { document.getElementById('catTitle').textContent = 'Kategori bulunamadı'; grid.innerHTML = '<div class="empty-note">Bu kategori mevcut değil</div>'; return; }
  document.title = cat.name + ' — MUKANTARA';
  document.getElementById('catName').textContent = cat.name;
  document.getElementById('catTitle').textContent = cat.name;
  document.getElementById('catDesc').textContent = cat.description || '';
  const { data: products, error: prodErr } = await sb.from('mukantara_products').select('*').eq('category_id', cat.id).order('sort_order');
  if (prodErr || !products || products.length === 0) { grid.innerHTML = '<div class="empty-note">Bu kategoride henüz eser eklenmedi</div>'; return; }
  grid.innerHTML = products.map(p => {
    const img = publicImageUrl(p.image_url);
    const media = img ? '<div class="img-wrap"><img src="'+img+'" alt="'+escapeHtml(p.title)+'" loading="lazy"></div>' : '<div class="img-wrap"><div class="p-icon">'+categoryIcon(cat.slug)+'</div></div>';
    return '<a class="p-card" href="urun.html?slug='+encodeURIComponent(p.slug)+'">'+media+'<div class="p-body"><h3>'+escapeHtml(p.title)+'</h3>'+(p.material?'<p>'+escapeHtml(p.material)+'</p>':'')+'</div></a>';
  }).join('');
}
init();
</script>
</body>
</html>
