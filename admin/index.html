<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Yönetim — MUKANTARA</title>
<meta name="robots" content="noindex, nofollow">
<link rel="icon" href="../assets/logo/mark.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@500;600;700&family=Work+Sans:wght@400;500;600&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../assets/brand.css?v=2">
<style>
  body{padding-bottom:80px;}
  header{position:static; background:var(--bg-panel); border-bottom:1px solid var(--hairline); backdrop-filter:none;}
  .navbar{padding:18px 32px;}
  main{max-width:980px; margin:0 auto; padding:40px 32px;}

  .login-box{max-width:380px; margin:120px auto; padding:40px; background:var(--bg-panel); border:1px solid var(--hairline);}
  .login-box h1{font-family:'Sora',sans-serif; font-size:22px; margin:0 0 24px;}
  .field{margin-bottom:18px; display:flex; flex-direction:column; gap:6px;}
  .field label{font-family:'JetBrains Mono',monospace; font-size:11px; letter-spacing:0.08em; text-transform:uppercase; color:var(--label);}
  .field input, .field textarea, .field select{
    background:var(--bg); border:1px solid var(--hairline-strong); color:var(--ink);
    padding:11px 12px; font-family:'Work Sans',sans-serif; font-size:14px; border-radius:0;
  }
  .field input:focus, .field textarea:focus, .field select:focus{outline:none; border-color:var(--brass-light);}
  .field textarea{min-height:90px; resize:vertical;}
  .msg{font-size:13px; margin-top:14px; font-family:'JetBrains Mono',monospace;}
  .msg.err{color:#e07a5f;}
  .msg.ok{color:var(--brass-light);}

  .tabs{display:flex; gap:4px; margin-bottom:36px; border-bottom:1px solid var(--hairline);}
  .tab-btn{background:none; border:none; color:var(--label); font-family:'JetBrains Mono',monospace; font-size:12px; letter-spacing:0.08em; text-transform:uppercase; padding:14px 18px; cursor:pointer; border-bottom:2px solid transparent;}
  .tab-btn.active{color:var(--brass-light); border-color:var(--brass);}
  .panel{display:none;}
  .panel.active{display:block;}

  .card{background:var(--bg-panel); border:1px solid var(--hairline); padding:26px; margin-bottom:20px;}
  .card h2{font-family:'Sora',sans-serif; font-size:16px; margin:0 0 18px;}
  .row-list{display:flex; flex-direction:column; gap:1px; background:var(--hairline); border:1px solid var(--hairline); margin-bottom:28px;}
  .row-item{background:var(--bg); padding:16px 20px; display:flex; align-items:center; gap:16px;}
  .row-item .thumb{width:48px; height:48px; background:var(--bg-panel); flex-shrink:0; object-fit:cover;}
  .row-item .info{flex:1; min-width:0;}
  .row-item .info .t{font-family:'Sora',sans-serif; font-size:14px; font-weight:600;}
  .row-item .info .s{font-family:'JetBrains Mono',monospace; font-size:11px; color:var(--label);}
  .row-item .acts{display:flex; gap:8px;}
  .row-item .acts button{background:none;border:1px solid var(--hairline-strong); color:var(--ink-dim); font-size:11px; padding:6px 10px; cursor:pointer; font-family:'JetBrains Mono',monospace;}
  .row-item .acts button:hover{border-color:var(--brass-light); color:var(--brass-light);}
  .row-item .acts button.danger:hover{border-color:#e07a5f; color:#e07a5f;}

  .grid2{display:grid; grid-template-columns:1fr 1fr; gap:16px;}
  @media (max-width:640px){ .grid2{grid-template-columns:1fr;} }
  .topbar{display:flex; justify-content:space-between; align-items:center; margin-bottom:8px;}
.cf-row{display:flex; gap:8px; align-items:center;}
.cf-row input{flex:1; background:var(--bg); border:1px solid var(--hairline-strong); color:var(--ink); padding:9px 10px; font-family:'Work Sans',sans-serif; font-size:13px;}
.cf-row button{background:none; border:1px solid var(--hairline-strong); color:var(--label); font-size:11px; padding:8px 10px; cursor:pointer; font-family:'JetBrains Mono',monospace; flex-shrink:0;}
.cf-row button:hover{border-color:#e07a5f; color:#e07a5f;}
  .who{font-family:'JetBrains Mono',monospace; font-size:12px; color:var(--label);}
</style>
</head>
<body>

<header>
  <div class="navbar">
    <a href="../index.html" class="wordmark"><img src="../assets/logo/mark.png" alt="Mukantara"> MUKANTARA <span style="color:var(--label);font-family:'JetBrains Mono',monospace;font-size:11px;">/ YÖNETİM</span></a>
    <div id="logoutWrap" style="display:none;">
      <button class="btn btn-line" id="logoutBtn" style="font-size:11px;padding:8px 14px;">Çıkış Yap</button>
    </div>
  </div>
</header>

<div id="loginScreen" class="login-box">
  <h1>Yönetim Girişi</h1>
  <div class="field"><label>E-posta</label><input type="email" id="loginEmail" value="info@mukantara.com"></div>
  <div class="field"><label>Şifre</label><input type="password" id="loginPass"></div>
  <button class="btn btn-solid" id="loginBtn" style="width:100%; justify-content:center;">Giriş Yap</button>
  <div class="msg" id="loginMsg"></div>
</div>

<main id="dashboard" style="display:none;">
  <div class="topbar">
    <span class="who" id="whoAmI"></span>
  </div>
  <div class="tabs">
    <button class="tab-btn active" data-tab="metinler">Site Metinleri</button>
    <button class="tab-btn" data-tab="kategoriler">Kategoriler</button>
    <button class="tab-btn" data-tab="urunler">Ürünler</button>
    <button class="tab-btn" data-tab="videolar">Videolar</button>
    <button class="tab-btn" data-tab="atolye">Atölye Fotoğrafları</button>
  </div>

  <div class="panel active" id="panel-metinler">
    <div class="card">
      <h2>Ana Sayfa Metinleri</h2>
      <div id="contentFields"></div>
      <button class="btn btn-solid" id="saveContentBtn" style="margin-top:6px;">Metinleri Kaydet</button>
      <div class="msg" id="contentMsg"></div>
    </div>
  </div>

  <div class="panel" id="panel-kategoriler">
    <div class="row-list" id="categoryList"></div>
    <div class="card">
      <h2 id="catFormTitle">Yeni Kategori Ekle</h2>
      <input type="hidden" id="catId">
      <div class="grid2">
        <div class="field"><label>Ad</label><input type="text" id="catName" placeholder="örn. Avize"></div>
        <div class="field"><label>Slug (URL)</label><input type="text" id="catSlug" placeholder="örn. avize"></div>
      </div>
      <div class="field"><label>Açıklama</label><textarea id="catDesc" placeholder="Kısa kategori açıklaması"></textarea></div>
      <div class="field"><label>Örnek Görsel</label><input type="file" id="catImage" accept="image/*"></div>
      <button class="btn btn-solid" id="saveCatBtn">Kaydet</button>
      <button class="btn btn-line" id="cancelCatBtn" style="display:none;">İptal</button>
      <div class="msg" id="catMsg"></div>
    </div>
  </div>

  <div class="panel" id="panel-urunler">
    <div class="row-list" id="productList"></div>
    <div class="card">
      <h2 id="prodFormTitle">Yeni Ürün Ekle</h2>
      <input type="hidden" id="prodId">
      <div class="grid2">
        <div class="field"><label>Başlık</label><input type="text" id="prodTitle" placeholder="örn. Geometrik Avize No.1"></div>
        <div class="field"><label>Slug (URL)</label><input type="text" id="prodSlug" placeholder="örn. geometrik-avize-1"></div>
      </div>
      <div class="grid2">
        <div class="field"><label>Kategori</label><select id="prodCategory"></select></div>
        <div class="field"><label>Malzeme</label><input type="text" id="prodMaterial" placeholder="örn. Pirinç (Ham)"></div>
      </div>
      <div class="field"><label>Teknik</label><input type="text" id="prodTechnique" placeholder="örn. Dövme, Kalemkâri"></div>
      <div class="field" style="flex-direction:row; align-items:center; gap:8px;">
        <input type="checkbox" id="prodFeatured" style="width:16px; height:16px;">
        <label style="margin:0;">Ana sayfada "Öne Çıkanlar" büyük görsel alanında göster</label>
      </div>
      <div class="field"><label>Açıklama</label><textarea id="prodDesc" placeholder="Ürün açıklaması"></textarea></div>
      <div class="field"><label>Ana Görsel (kart ve galeri için)</label><input type="file" id="prodImage" accept="image/*"></div>
      <div class="field"><label>Ek Görseller — Yakından Görünüm İçin (birden fazla seçebilirsin)</label><input type="file" id="prodExtraImages" accept="image/*" multiple></div>
      <div class="field">
        <label>Ek Özel Alanlar (istediğin kadar ekleyebilirsin)</label>
        <div id="customFieldsList" style="display:flex; flex-direction:column; gap:8px; margin-top:4px;"></div>
        <button type="button" class="btn btn-line" id="addCustomFieldBtn" style="margin-top:10px; align-self:flex-start; font-size:12px; padding:9px 14px;">+ Alan Ekle</button>
      </div>
      <button class="btn btn-solid" id="saveProdBtn" style="margin-top:8px;">Kaydet</button>
      <button class="btn btn-line" id="cancelProdBtn" style="display:none;">İptal</button>
      <div class="msg" id="prodMsg"></div>
    </div>
  </div>

  <div class="panel" id="panel-videolar">
    <div class="row-list" id="videoList"></div>
    <div class="card">
      <h2>Yeni Video Ekle</h2>
      <div class="field"><label>Video Başlığı</label><input type="text" id="videoTitle" placeholder="örn. Atölye Süreci"></div>
      <div class="field"><label>Video Dosyası (mp4 önerilir, max 200MB)</label><input type="file" id="videoFile" accept="video/*"></div>
      <div class="field"><label>Kapak Görseli (opsiyonel)</label><input type="file" id="videoThumb" accept="image/*"></div>
      <button class="btn btn-solid" id="saveVideoBtn">Kaydet</button>
      <div class="msg" id="videoMsg"></div>
    </div>
  </div>

  <div class="panel" id="panel-atolye">
    <div class="row-list" id="workshopList"></div>
    <div class="card">
      <h2>Yeni Atölye Fotoğrafı Ekle</h2>
      <div class="field"><label>Görsel</label><input type="file" id="workshopImage" accept="image/*"></div>
      <div class="field"><label>Açıklama (opsiyonel)</label><input type="text" id="workshopCaption" placeholder="örn. Kalemkâri işleme anı"></div>
      <button class="btn btn-solid" id="saveWorkshopBtn">Kaydet</button>
      <div class="msg" id="workshopMsg"></div>
    </div>
  </div>
</main>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="../assets/shared.js?v=2"></script>
<script>
const loginScreen = document.getElementById('loginScreen');
const dashboard = document.getElementById('dashboard');
const logoutWrap = document.getElementById('logoutWrap');

function slugify(str){
  const map = {'ç':'c','ğ':'g','ı':'i','ö':'o','ş':'s','ü':'u','Ç':'c','Ğ':'g','İ':'i','Ö':'o','Ş':'s','Ü':'u'};
  return str.split('').map(ch => map[ch] || ch).join('')
    .toLowerCase().trim().replace(/[^a-z0-9]+/g,'-').replace(/(^-|-$)/g,'');
}

async function checkSession(){
  const { data } = await sb.auth.getSession();
  if (data.session) { showDashboard(data.session); } else { showLogin(); }
}
function showLogin(){ loginScreen.style.display='block'; dashboard.style.display='none'; logoutWrap.style.display='none'; }
function showDashboard(session){
  loginScreen.style.display='none'; dashboard.style.display='block'; logoutWrap.style.display='block';
  document.getElementById('whoAmI').textContent = session.user.email + ' olarak giriş yapıldı';
  loadContent(); loadCategories(); loadProducts(); loadVideos(); loadWorkshopPhotos();
}

document.getElementById('loginBtn').onclick = async () => {
  const email = document.getElementById('loginEmail').value.trim();
  const password = document.getElementById('loginPass').value;
  const msg = document.getElementById('loginMsg');
  msg.textContent = 'Giriş yapılıyor…'; msg.className='msg';
  const { data, error } = await sb.auth.signInWithPassword({ email, password });
  if (error) { msg.textContent = 'Hata: ' + error.message; msg.className='msg err'; return; }
  msg.textContent = '';
  showDashboard(data.session);
};
document.getElementById('logoutBtn').onclick = async () => { await sb.auth.signOut(); showLogin(); };

document.querySelectorAll('.tab-btn').forEach(btn => {
  btn.onclick = () => {
    document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));
    document.querySelectorAll('.panel').forEach(p=>p.classList.remove('active'));
    btn.classList.add('active');
    document.getElementById('panel-'+btn.dataset.tab).classList.add('active');
  };
});

// ---------- SİTE METİNLERİ ----------
const CONTENT_LABELS = {
  hero_tag: 'Hero Eyebrow (Eser No / Tarih)',
  hero_title: 'Hero Başlık (Alıntı)',
  hero_body: 'Hero Açıklama',
  curator_tag: 'Manifesto Etiketi',
  curator_quote: 'Manifesto Alıntısı',
  curator_body: 'Manifesto Açıklaması',
  contact_phone: 'Telefon / WhatsApp',
  contact_email: 'E-posta'
};
async function loadContent(){
  const { data } = await sb.from('mukantara_site_content').select('*');
  const wrap = document.getElementById('contentFields');
  wrap.innerHTML = '';
  const order = Object.keys(CONTENT_LABELS);
  order.forEach(key => {
    const row = (data||[]).find(r => r.key === key);
    const isLong = key.startsWith('manifesto');
    const isGalleryMode = key === 'gallery_mode';
    const currentVal = row ? row.value : '';
    const field = document.createElement('div');
    field.className = 'field';
    field.style.marginBottom = '18px';
    let inputHtml;
    if (isGalleryMode) {
      inputHtml = '<select data-key="gallery_mode">' +
        '<option value="random"'+(currentVal==='random'?' selected':'')+'>Karışık (her ziyarette farklı sırada)</option>' +
        '<option value="sequential"'+(currentVal==='sequential'?' selected':'')+'>Sıralı (eklendiği sırayla)</option>' +
        '</select>';
    } else if (isLong) {
      inputHtml = '<textarea data-key="'+key+'">'+escapeHtml(currentVal)+'</textarea>';
    } else {
      inputHtml = '<input type="text" data-key="'+key+'" value="'+escapeHtml(currentVal)+'">';
    }
    field.innerHTML = '<label>'+CONTENT_LABELS[key]+'</label>' + inputHtml;
    wrap.appendChild(field);
  });
}
document.getElementById('saveContentBtn').onclick = async () => {
  const msg = document.getElementById('contentMsg');
  msg.textContent = 'Kaydediliyor…'; msg.className='msg';
  const inputs = document.querySelectorAll('#contentFields [data-key]');
  const rows = Array.from(inputs).map(el => ({ key: el.dataset.key, value: el.value }));
  const { error } = await sb.from('mukantara_site_content').upsert(rows);
  if (error) { msg.textContent = 'Hata: ' + error.message; msg.className='msg err'; return; }
  msg.textContent = 'Kaydedildi ✓'; msg.className='msg ok';
};

// ---------- KATEGORİLER ----------
let editingCatId = null;
async function loadCategories(){
  const { data } = await sb.from('mukantara_categories').select('*').order('sort_order');
  const list = document.getElementById('categoryList');
  const select = document.getElementById('prodCategory');
  list.innerHTML = ''; select.innerHTML = '';
  (data||[]).forEach(cat => {
    const img = publicImageUrl(cat.sample_image_url);
    const item = document.createElement('div');
    item.className = 'row-item';
    item.innerHTML =
      (img ? '<img class="thumb" src="'+img+'">' : '<div class="thumb"></div>') +
      '<div class="info"><div class="t">'+escapeHtml(cat.name)+'</div><div class="s">/'+escapeHtml(cat.slug)+'</div></div>' +
      '<div class="acts"><button data-act="edit">Düzenle</button><button data-act="del" class="danger">Sil</button></div>';
    item.querySelector('[data-act=edit]').onclick = () => editCategory(cat);
    item.querySelector('[data-act=del]').onclick = () => deleteCategory(cat);
    list.appendChild(item);
    const opt = document.createElement('option');
    opt.value = cat.id; opt.textContent = cat.name;
    select.appendChild(opt);
  });
}
function editCategory(cat){
  editingCatId = cat.id;
  document.getElementById('catFormTitle').textContent = 'Kategoriyi Düzenle: ' + cat.name;
  document.getElementById('catId').value = cat.id;
  document.getElementById('catName').value = cat.name;
  document.getElementById('catSlug').value = cat.slug;
  document.getElementById('catDesc').value = cat.description || '';
  document.getElementById('cancelCatBtn').style.display = 'inline-flex';
}
document.getElementById('cancelCatBtn').onclick = () => resetCatForm();
function resetCatForm(){
  editingCatId = null;
  document.getElementById('catFormTitle').textContent = 'Yeni Kategori Ekle';
  document.getElementById('catId').value = '';
  document.getElementById('catName').value = '';
  document.getElementById('catSlug').value = '';
  document.getElementById('catDesc').value = '';
  document.getElementById('catImage').value = '';
  document.getElementById('cancelCatBtn').style.display = 'none';
}
async function deleteCategory(cat){
  if (!confirm('"'+cat.name+'" kategorisini silmek istediğine emin misin?')) return;
  await sb.from('mukantara_categories').delete().eq('id', cat.id);
  loadCategories();
}
document.getElementById('catName').addEventListener('input', (e) => {
  if (!editingCatId) document.getElementById('catSlug').value = slugify(e.target.value);
});
document.getElementById('saveCatBtn').onclick = async () => {
  const msg = document.getElementById('catMsg');
  const name = document.getElementById('catName').value.trim();
  const slug = document.getElementById('catSlug').value.trim();
  if (!name || !slug) { msg.textContent = 'Ad ve slug zorunlu'; msg.className='msg err'; return; }
  msg.textContent = 'Kaydediliyor…'; msg.className='msg';

  let sample_image_url = undefined;
  const file = document.getElementById('catImage').files[0];
  if (file) {
    const path = 'categories/' + slug + '-' + Date.now() + '.' + file.name.split('.').pop();
    const { error: upErr } = await sb.storage.from('mukantara-images').upload(path, file, { upsert: true });
    if (upErr) { msg.textContent = 'Görsel yüklenemedi: ' + upErr.message; msg.className='msg err'; return; }
    sample_image_url = path;
  }

  const payload = { name, slug, description: document.getElementById('catDesc').value };
  if (sample_image_url) payload.sample_image_url = sample_image_url;

  let error;
  if (editingCatId) {
    ({ error } = await sb.from('mukantara_categories').update(payload).eq('id', editingCatId));
  } else {
    ({ error } = await sb.from('mukantara_categories').insert(payload));
  }
  if (error) { msg.textContent = 'Hata: ' + error.message; msg.className='msg err'; return; }
  msg.textContent = 'Kaydedildi ✓'; msg.className='msg ok';
  resetCatForm();
  loadCategories();
};

// ---------- ÖZEL ALANLAR (customFields) ----------
function addCustomFieldRow(label, value){
  const list = document.getElementById('customFieldsList');
  const row = document.createElement('div');
  row.className = 'cf-row';
  row.innerHTML =
    '<input type="text" placeholder="Alan adı (örn. Ölçü)" class="cf-label" value="'+escapeHtml(label||'')+'">' +
    '<input type="text" placeholder="Değer (örn. 45 cm)" class="cf-value" value="'+escapeHtml(value||'')+'">' +
    '<button type="button">Sil</button>';
  row.querySelector('button').onclick = () => row.remove();
  list.appendChild(row);
}
document.getElementById('addCustomFieldBtn').onclick = () => addCustomFieldRow('', '');
function getCustomFieldsFromForm(){
  return Array.from(document.querySelectorAll('#customFieldsList .cf-row')).map(row => ({
    label: row.querySelector('.cf-label').value.trim(),
    value: row.querySelector('.cf-value').value.trim()
  })).filter(f => f.label);
}
function clearCustomFieldsForm(){
  document.getElementById('customFieldsList').innerHTML = '';
}

// ---------- ÜRÜNLER ----------
let editingProdId = null;
let currentEditingExtraImages = [];
async function loadProducts(){
  const { data } = await sb.from('mukantara_products').select('*, mukantara_categories(name)').order('sort_order');
  const list = document.getElementById('productList');
  list.innerHTML = '';
  (data||[]).forEach(p => {
    const img = publicImageUrl(p.image_url);
    const item = document.createElement('div');
    item.className = 'row-item';
    item.innerHTML =
      (img ? '<img class="thumb" src="'+img+'">' : '<div class="thumb"></div>') +
      '<div class="info"><div class="t">'+escapeHtml(p.title)+'</div><div class="s">'+escapeHtml(p.mukantara_categories?p.mukantara_categories.name:'kategorisiz')+' · /'+escapeHtml(p.slug)+'</div></div>' +
      '<div class="acts"><button data-act="edit">Düzenle</button><button data-act="del" class="danger">Sil</button></div>';
    item.querySelector('[data-act=edit]').onclick = () => editProduct(p);
    item.querySelector('[data-act=del]').onclick = () => deleteProduct(p);
    list.appendChild(item);
  });
}
function editProduct(p){
  editingProdId = p.id;
  document.getElementById('prodFormTitle').textContent = 'Ürünü Düzenle: ' + p.title;
  document.getElementById('prodId').value = p.id;
  document.getElementById('prodTitle').value = p.title;
  document.getElementById('prodSlug').value = p.slug;
  document.getElementById('prodCategory').value = p.category_id || '';
  document.getElementById('prodMaterial').value = p.material || '';
  document.getElementById('prodTechnique').value = p.technique || '';
  document.getElementById('prodFeatured').checked = !!p.is_featured;
  document.getElementById('prodDesc').value = p.description || '';
  clearCustomFieldsForm();
  (Array.isArray(p.custom_fields) ? p.custom_fields : []).forEach(f => addCustomFieldRow(f.label, f.value));
  currentEditingExtraImages = Array.isArray(p.images) ? p.images : [];
  document.getElementById('cancelProdBtn').style.display = 'inline-flex';
}
document.getElementById('cancelProdBtn').onclick = () => resetProdForm();
function resetProdForm(){
  editingProdId = null;
  document.getElementById('prodFormTitle').textContent = 'Yeni Ürün Ekle';
  ['prodId','prodTitle','prodSlug','prodMaterial','prodTechnique','prodDesc'].forEach(id => document.getElementById(id).value='');
  document.getElementById('prodFeatured').checked = false;
  document.getElementById('prodImage').value = '';
  document.getElementById('prodExtraImages').value = '';
  currentEditingExtraImages = [];
  clearCustomFieldsForm();
  document.getElementById('cancelProdBtn').style.display = 'none';
}
document.getElementById('prodTitle').addEventListener('input', (e) => {
  if (!editingProdId) document.getElementById('prodSlug').value = slugify(e.target.value);
});
async function deleteProduct(p){
  if (!confirm('"'+p.title+'" ürününü silmek istediğine emin misin?')) return;
  await sb.from('mukantara_products').delete().eq('id', p.id);
  loadProducts();
}
document.getElementById('saveProdBtn').onclick = async () => {
  const msg = document.getElementById('prodMsg');
  const title = document.getElementById('prodTitle').value.trim();
  const slug = document.getElementById('prodSlug').value.trim();
  if (!title || !slug) { msg.textContent = 'Başlık ve slug zorunlu'; msg.className='msg err'; return; }
  msg.textContent = 'Kaydediliyor…'; msg.className='msg';

  let image_url = undefined;
  const file = document.getElementById('prodImage').files[0];
  if (file) {
    const path = 'products/' + slug + '-' + Date.now() + '.' + file.name.split('.').pop();
    const { error: upErr } = await sb.storage.from('mukantara-images').upload(path, file, { upsert: true });
    if (upErr) { msg.textContent = 'Görsel yüklenemedi: ' + upErr.message; msg.className='msg err'; return; }
    image_url = path;
  }

  const extraFiles = Array.from(document.getElementById('prodExtraImages').files || []);
  let images = undefined;
  if (extraFiles.length > 0) {
    msg.textContent = 'Ek görseller yükleniyor…'; msg.className='msg';
    const uploaded = [];
    for (const ef of extraFiles) {
      const epath = 'products/' + slug + '-extra-' + Date.now() + '-' + Math.random().toString(36).slice(2,7) + '.' + ef.name.split('.').pop();
      const { error: eErr } = await sb.storage.from('mukantara-images').upload(epath, ef);
      if (!eErr) uploaded.push(epath);
    }
    // duzenleme modunda mevcut ek gorsellere ekle, yeni urunde sifirdan olustur
    const existing = (editingProdId && currentEditingExtraImages) ? currentEditingExtraImages : [];
    images = [...existing, ...uploaded];
  }

  const payload = {
    title, slug,
    category_id: document.getElementById('prodCategory').value || null,
    material: document.getElementById('prodMaterial').value,
    technique: document.getElementById('prodTechnique').value,
    description: document.getElementById('prodDesc').value,
    is_featured: document.getElementById('prodFeatured').checked,
    custom_fields: getCustomFieldsFromForm()
  };
  if (image_url) payload.image_url = image_url;
  if (images) payload.images = images;

  let error;
  if (editingProdId) {
    ({ error } = await sb.from('mukantara_products').update(payload).eq('id', editingProdId));
  } else {
    ({ error } = await sb.from('mukantara_products').insert(payload));
  }
  if (error) { msg.textContent = 'Hata: ' + error.message; msg.className='msg err'; return; }
  msg.textContent = 'Kaydedildi ✓'; msg.className='msg ok';
  resetProdForm();
  loadProducts();
};

// ---------- VİDEOLAR ----------
async function loadVideos(){
  const { data } = await sb.from('mukantara_videos').select('*').order('sort_order');
  const list = document.getElementById('videoList');
  list.innerHTML = '';
  (data||[]).forEach(v => {
    const thumb = publicImageUrl(v.thumbnail_url);
    const item = document.createElement('div');
    item.className = 'row-item';
    item.innerHTML =
      (thumb ? '<img class="thumb" src="'+thumb+'">' : '<div class="thumb"></div>') +
      '<div class="info"><div class="t">'+escapeHtml(v.title || 'İsimsiz video')+'</div><div class="s">'+escapeHtml(v.video_url)+'</div></div>' +
      '<div class="acts"><button data-act="del" class="danger">Sil</button></div>';
    item.querySelector('[data-act=del]').onclick = async () => {
      if (!confirm('Bu videoyu silmek istediğine emin misin?')) return;
      await sb.from('mukantara_videos').delete().eq('id', v.id);
      loadVideos();
    };
    list.appendChild(item);
  });
}
document.getElementById('saveVideoBtn').onclick = async () => {
  const msg = document.getElementById('videoMsg');
  const title = document.getElementById('videoTitle').value.trim();
  const file = document.getElementById('videoFile').files[0];
  if (!file) { msg.textContent = 'Video dosyası seçmelisin'; msg.className='msg err'; return; }
  msg.textContent = 'Yükleniyor… (büyük dosyalarda biraz sürebilir)'; msg.className='msg';

  const path = 'videos/' + Date.now() + '-' + file.name.replace(/[^a-zA-Z0-9._-]/g,'');
  const { error: upErr } = await sb.storage.from('mukantara-videos').upload(path, file);
  if (upErr) { msg.textContent = 'Video yüklenemedi: ' + upErr.message; msg.className='msg err'; return; }

  let thumbnail_url = undefined;
  const thumbFile = document.getElementById('videoThumb').files[0];
  if (thumbFile) {
    const tpath = 'video-thumbs/' + Date.now() + '.' + thumbFile.name.split('.').pop();
    const { error: tErr } = await sb.storage.from('mukantara-images').upload(tpath, thumbFile, { upsert: true });
    if (!tErr) thumbnail_url = tpath;
  }

  const payload = { title, video_url: path };
  if (thumbnail_url) payload.thumbnail_url = thumbnail_url;

  const { error } = await sb.from('mukantara_videos').insert(payload);
  if (error) { msg.textContent = 'Hata: ' + error.message; msg.className='msg err'; return; }
  msg.textContent = 'Kaydedildi ✓'; msg.className='msg ok';
  document.getElementById('videoTitle').value = '';
  document.getElementById('videoFile').value = '';
  document.getElementById('videoThumb').value = '';
  loadVideos();
};

    item.innerHTML =
      (img ? '<img class="thumb" src="'+img+'">' : '<div class="thumb"></div>') +

      '<div class="acts"><button data-act="del" class="danger">Sil</button></div>';
    item.querySelector('[data-act=del]').onclick = async () => {
      if (!confirm('Bu fotoğrafı silmek istediğine emin misin?')) return;
      await sb.from('mukantara_workshop_photos').delete().eq('id', p.id);

document.getElementById('saveWorkshopBtn').onclick = async () => {
  const msg = document.getElementById('workshopMsg');
  const file = document.getElementById('workshopImage').files[0];
  if (!file) { msg.textContent = 'Görsel seçmelisin'; msg.className='msg err'; return; }
  msg.textContent = 'Yükleniyor…'; msg.className='msg';

  const path = 'workshop/' + Date.now() + '.' + file.name.split('.').pop();
  const { error: upErr } = await sb.storage.from('mukantara-images').upload(path, file);
  if (upErr) { msg.textContent = 'Görsel yüklenemedi: ' + upErr.message; msg.className='msg err'; return; }

  const { error } = await sb.from('mukantara_workshop_photos').insert({
    image_url: path,
    caption: document.getElementById('workshopCaption').value.trim()
  });
  if (error) { msg.textContent = 'Hata: ' + error.message; msg.className='msg err'; return; }
  msg.textContent = 'Kaydedildi ✓'; msg.className='msg ok';
  document.getElementById('workshopImage').value = '';
  document.getElementById('workshopCaption').value = '';
  loadWorkshopPhotos();
};

checkSession();
