    ["Car_alpha","Car_beta"],["Car_beta","Car_gamma"],["Car_gamma","Car_delta"],["Car_delta","Car_epsilon"],["Car_epsilon","Car_zeta"],["Car_zeta","Car_eta"],["Car_eta","Car_theta"],

// ─── MATEMATİKSEL FONKSİYONLAR ───
function raDecToCartesian(raDeg, decDeg, radius) {
    const ra = THREE.MathUtils.degToRad(raDeg);
    const dec = THREE.MathUtils.degToRad(decDeg);
    const x = radius * Math.cos(dec) * Math.cos(ra);
    const y = radius * Math.sin(dec);
    const z = radius * Math.cos(dec) * Math.sin(ra);
    return new THREE.Vector3(x, y, z);
}

function eclipticToEquatorial(lambdaDeg, betaDeg, obliquityDeg) {
    const lambda = THREE.MathUtils.degToRad(lambdaDeg);
    const beta = THREE.MathUtils.degToRad(betaDeg);
    const epsilon = THREE.MathUtils.degToRad(obliquityDeg);
    const decRad = Math.asin(Math.sin(beta) * Math.cos(epsilon) + Math.cos(beta) * Math.sin(epsilon) * Math.sin(lambda));
    let raRad = Math.atan2(Math.sin(lambda) * Math.cos(epsilon) - Math.tan(beta) * Math.sin(epsilon), Math.cos(lambda));
    if (raRad < 0) raRad += 2 * Math.PI;
    return { raDeg: THREE.MathUtils.radToDeg(raRad), decDeg: THREE.MathUtils.radToDeg(decRad) };
}

function calculatePrecession(raDeg, year) {
    // Basit presesyon: RA üzerinde yıllık kayma
    return raDeg + (year - EPOCH_START) * PRECESSION_RATE;
}

function preprocessStarData() {
    console.log('preprocessStarData: STAR_CATALOG length =', STAR_CATALOG.length);
    let errorCount = 0;
    STAR_CATALOG.forEach((star, idx) => {
        try {
            const pos = new THREE.Vector3(star.x, star.y, star.z);
            const mag = star.mag;
            const color = new THREE.Color();
            const intensity = Math.max(0.2, (6.5 - mag) / 6.5 * 2.0);
            // Hafif mavi-beyaz ton (cool white) - gökyüzüne uyumlu
            color.setRGB(intensity * 0.92, intensity * 0.96, intensity * 1.0);

            allStarDataProcessed.push({
                position: pos,
                originalColor: color.clone(),
                color: color.clone(),
                starInfo: {
                    names: star.names,
                    ubName: star.ub_name,
                    magnitude: mag,
                    ra: star.ra,
                    dec: star.dec,
                    lineKey: star.lineKey,
                    lines: star.lines,
                    abb: star.abb,
                    observation_flag: 'o',
                    raOrig: star.ra,
                    decOrig: star.dec
                }
            });
        } catch(e) {
            errorCount++;
            console.error('Error processing star', idx, e);
        }
    });
    console.log('preprocessStarData done, processed:', allStarDataProcessed.length, 'errors:', errorCount);
}

function drawStars() {
    if (starPointsMesh) celestialGroup.remove(starPointsMesh);
    const positions = [];
    const colors = [];
    const sizes = [];

    allStarDataProcessed.forEach(star => {
        positions.push(star.position.x, star.position.y, star.position.z);
        colors.push(star.color.r, star.color.g, star.color.b);
        const size = Math.max(1.5, (6.5 - star.starInfo.magnitude) * 1.2);
        sizes.push(size);
    });

    const geometry = new THREE.BufferGeometry();
    geometry.setAttribute('position', new THREE.Float32BufferAttribute(positions, 3));
    geometry.setAttribute('color', new THREE.Float32BufferAttribute(colors, 3));
    geometry.setAttribute('size', new THREE.Float32BufferAttribute(sizes, 1));
    geometry.computeBoundingSphere();

    const material = new THREE.PointsMaterial({
        size: 7,
        sizeAttenuation: true,
        transparent: true,
        opacity: 0.95,
        vertexColors: true,
        blending: THREE.AdditiveBlending
    });

    starPointsMesh = new THREE.Points(geometry, material);
    celestialGroup.add(starPointsMesh);
}

function drawStarLabels() {
    while (starLabelGroup.children.length > 0) {
        starLabelGroup.remove(starLabelGroup.children[0]);
    }
    if (!allStarDataProcessed || allStarDataProcessed.length === 0) return;

    const LABEL_COLOR = new THREE.Color(0xE0DDD5);
    const LABEL_OFFSET = 75;
    let drawn = 0;

    allStarDataProcessed.forEach((star, idx) => {
        const info = star.starInfo;
        const name = (info.names && info.names[currentLang]) || 
                     (info.names && info.names['en']) || 
                     info.ubName || '';
        if (!name || typeof name !== 'string') return;
        const pos = star.position.clone().normalize().multiplyScalar(CELESTIAL_RADIUS + LABEL_OFFSET);
        const sprite = createTextSprite(name, LABEL_COLOR, 38);
        if (sprite) {
            sprite.position.copy(pos);
            sprite.userData.starIndex = idx;
            starLabelGroup.add(sprite);
            drawn++;
        }
    });
    console.log('Labels drawn:', drawn);
}

function createTextSprite(text, color, fontSize) {
    if (!text || typeof text !== 'string') return null;
    const canvas = document.createElement('canvas');
    const ctx = canvas.getContext('2d');
    if (!ctx) return null;

    // HUGE font for visibility
    const size = Math.max(fontSize || 30, 30);
    const font = 'Bold ' + size + 'px Inter, Tahoma, sans-serif';
    ctx.font = font;
    const metrics = ctx.measureText(text);
    const w = metrics.width + 30;
    const h = size + 16;
    canvas.width = w;
    canvas.height = h;
    ctx.font = font;
    ctx.fillStyle = '#' + color.getHexString();
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.shadowColor = 'rgba(0,0,0,1)';
    ctx.shadowBlur = 8;
    ctx.shadowOffsetX = 2;
    ctx.shadowOffsetY = 2;
    ctx.fillText(text, w / 2, h / 2);

    const texture = new THREE.CanvasTexture(canvas);
    texture.needsUpdate = true;
    const material = new THREE.SpriteMaterial({ map: texture, transparent: true, depthTest: false });
    const sprite = new THREE.Sprite(material);
    // BIG scale
    sprite.scale.set(w / 4, h / 4, 1);
    return sprite;
}

function drawUsturlabGrid() {
    usturlabGridGroup.clear();
    const radius = CELESTIAL_RADIUS * 1.01;

    // Gök Ekvatoru
    const eqMat = new THREE.LineBasicMaterial({ color: 0x9333ea, opacity: 0.9 });
    const eqPts = [];
    for (let ra = 0; ra <= 360; ra += 5) eqPts.push(raDecToCartesian(ra, 0, radius));
    usturlabGridGroup.add(new THREE.Line(new THREE.BufferGeometry().setFromPoints(eqPts), eqMat));

    // Ekliptik
    const eclMat = new THREE.LineBasicMaterial({ color: 0xf59e0b, opacity: 0.9 });
    const eclPts = [];
    for (let lam = 0; lam <= 360; lam += 5) {
        const eq = eclipticToEquatorial(lam, 0, OBLIQUITY_1437);
        eclPts.push(raDecToCartesian(eq.raDeg, eq.decDeg, radius));
    }
    usturlabGridGroup.add(new THREE.Line(new THREE.BufferGeometry().setFromPoints(eclPts), eclMat));

    // Dönenceler
    const tropMat = new THREE.LineBasicMaterial({ color: 0x10b981, transparent: true, opacity: 0.8 });
    [OBLIQUITY_1437, -OBLIQUITY_1437].forEach(dec => {
        const pts = [];
        for (let ra = 0; ra <= 360; ra += 5) pts.push(raDecToCartesian(ra, dec, radius));
        usturlabGridGroup.add(new THREE.Line(new THREE.BufferGeometry().setFromPoints(pts), tropMat));
    });

    // RA Meridyenleri
    const raMat = new THREE.LineBasicMaterial({ color: 0x666666, transparent: true, opacity: 0.3 });
    for (let ra = 0; ra < 360; ra += 30) {
        const pts = [];
        for (let dec = -90; dec <= 90; dec += 5) pts.push(raDecToCartesian(ra, dec, radius));
        usturlabGridGroup.add(new THREE.Line(new THREE.BufferGeometry().setFromPoints(pts), raMat));
    }

    // DEC Paralelleri
    const decMat = new THREE.LineBasicMaterial({ color: 0x666666, transparent: true, opacity: 0.3 });
    for (let dec = -60; dec <= 60; dec += 20) {
        if (Math.abs(dec) < 2 || Math.abs(Math.abs(dec) - OBLIQUITY_1437) < 2) continue;
        const pts = [];
        for (let ra = 0; ra <= 360; ra += 10) pts.push(raDecToCartesian(ra, dec, radius));
        usturlabGridGroup.add(new THREE.Line(new THREE.BufferGeometry().setFromPoints(pts), decMat));
    }
}

function drawHorizonSystem() {
    if (horizonGroup) celestialGroup.remove(horizonGroup);
    horizonGroup = new THREE.Group();
    horizonGroup.name = "HorizonSystem";

    const horizonMat = new THREE.LineBasicMaterial({ color: 0xff0000, opacity: 0.9 });
    const pts = [];
    const r = CELESTIAL_RADIUS * 1.03;
    for (let a = 0; a <= 360; a += 5) {
        const rad = THREE.MathUtils.degToRad(a);
        pts.push(new THREE.Vector3(r * Math.cos(rad), 0, -r * Math.sin(rad)));
    }
    horizonGroup.add(new THREE.LineLoop(new THREE.BufferGeometry().setFromPoints(pts), horizonMat));

    const zenit = createTextSprite('ZENIT', new THREE.Color(0xFFFFFF), 18);
    zenit.position.set(0, CELESTIAL_RADIUS * 1.08, 0);
    horizonGroup.add(zenit);

    celestialGroup.add(horizonGroup);
    horizonGroup.visible = isUsturlabMode;
}

function drawCelestialPoles() {
    const ecpGeo = new THREE.SphereGeometry(6, 16, 16);
    const ecpMat = new THREE.MeshBasicMaterial({ color: 0x00FF00 });
    const ecp = new THREE.Mesh(ecpGeo, ecpMat);
    const eq = eclipticToEquatorial(0, 90 - OBLIQUITY_1437, OBLIQUITY_1437);
    const ecpPos = raDecToCartesian(eq.raDeg, eq.decDeg, CELESTIAL_RADIUS);
    ecp.position.copy(ecpPos);
    ecp.name = 'ECP';
    celestialGroup.add(ecp);

    const cnpGeo = new THREE.SphereGeometry(6, 16, 16);
    const cnpMat = new THREE.MeshBasicMaterial({ color: 0xFF00FF });
    const cnp = new THREE.Mesh(cnpGeo, cnpMat);
    cnp.position.set(0, CELESTIAL_RADIUS, 0);
    cnp.name = 'CNP';
    celestialGroup.add(cnp);
}

function drawAxes() {
    const old = celestialGroup.getObjectByName("EquatorialAxis");
    if (old) celestialGroup.remove(old);
    if (isUsturlabMode) {
        const pts = [new THREE.Vector3(0, -CELESTIAL_RADIUS * 1.4, 0), new THREE.Vector3(0, CELESTIAL_RADIUS * 1.4, 0)];
        const line = new THREE.Line(new THREE.BufferGeometry().setFromPoints(pts), new THREE.LineBasicMaterial({ color: 0xFF00FF, opacity: 0.6 }));
        line.name = "EquatorialAxis";
        celestialGroup.add(line);
    }
}

function toggleUsturlabMode() {
    isUsturlabMode = !isUsturlabMode;
    const t = translations[currentLang];
    const btn = document.getElementById('mode-button-icon');

    if (isUsturlabMode) {
        celestialGroup.rotation.set(0, THREE.MathUtils.degToRad(-90), -THREE.MathUtils.degToRad(SEMERKAND_LAT_DEG));
        controls.minPolarAngle = Math.PI / 2 - THREE.MathUtils.degToRad(SEMERKAND_LAT_DEG) - 0.02;
        controls.maxPolarAngle = Math.PI / 2 - THREE.MathUtils.degToRad(SEMERKAND_LAT_DEG) + 0.02;
        camera.position.set(700 * Math.sin(controls.minPolarAngle + 0.02), 700 * Math.cos(controls.minPolarAngle + 0.02), 0);
        if (btn) { btn.innerText = t.MOD_BUTTON_ASTROLABE; btn.classList.add('active'); }
        if (horizonGroup) horizonGroup.visible = true;
    } else {
        celestialGroup.rotation.set(-THREE.MathUtils.degToRad(OBLIQUITY_1437), 0, 0);
        controls.minPolarAngle = 0;
        controls.maxPolarAngle = Math.PI;
        camera.position.set(0, 0, 700);
        if (btn) { btn.innerText = t.MOD_BUTTON_CATALOG; btn.classList.remove('active'); }
        if (horizonGroup) horizonGroup.visible = false;
    }
    controls.target.set(0, 0, 0);
    controls.update();
    drawUsturlabGrid();
    drawAxes();
}

function updateYear(year) {
    const y = parseInt(year);
    document.getElementById('current-year-display').innerText = y;
    repositionStars(y);
}

function repositionStars(year) {
    if (!starPointsMesh) return;
    const positions = starPointsMesh.geometry.attributes.position.array;

    allStarDataProcessed.forEach((star, idx) => {
        const newRa = calculatePrecession(star.starInfo.raOrig, year);
        const pos = raDecToCartesian(newRa, star.starInfo.decOrig, CELESTIAL_RADIUS);

        positions[idx * 3] = pos.x;
        positions[idx * 3 + 1] = pos.y;
        positions[idx * 3 + 2] = pos.z;

        star.position.copy(pos);
        star.starInfo.ra = newRa;
    });

    starPointsMesh.geometry.attributes.position.needsUpdate = true;

    // Etiketleri güncelle
    starLabelGroup.children.forEach(sprite => {
        const idx = sprite.userData.starIndex;
        if (idx !== undefined && allStarDataProcessed[idx]) {
            const pos = allStarDataProcessed[idx].position.clone().normalize().multiplyScalar(CELESTIAL_RADIUS + 20);
            sprite.position.copy(pos);
        }
    });

    // Takımyıldız çizgilerini güncelle
    drawConstellationLines();

    if (selectedStarIndex !== null) displaySelectedStarDetails(selectedStarIndex);
}

function onPointerMove(e) {
    // Support both mouse and touch
    let clientX, clientY;
    if (e.touches && e.touches.length > 0) {
        clientX = e.touches[0].clientX;
        clientY = e.touches[0].clientY;
    } else if (e.changedTouches && e.changedTouches.length > 0) {
        clientX = e.changedTouches[0].clientX;
        clientY = e.changedTouches[0].clientY;
    } else {
        clientX = e.clientX;
        clientY = e.clientY;
    }
    mouse.x = (clientX / window.innerWidth) * 2 - 1;
    mouse.y = -(clientY / window.innerHeight) * 2 + 1;
    mouseClientX = clientX;
    mouseClientY = clientY;
}

function onStarClick() {
    if (document.getElementById('infographic-modal').style.display === 'flex') return;
    raycaster.setFromCamera(mouse, camera);
    const intersects = raycaster.intersectObject(starPointsMesh);
    if (intersects.length > 0) selectStar(intersects[0].index);
    else deselectStar();
}

function selectStar(index) {
    selectedStarIndex = index;
    displaySelectedStarDetails(index);
}

function deselectStar() {
    selectedStarIndex = null;
    document.getElementById('selected-star-container').classList.add('hidden');
}

function displaySelectedStarDetails(index) {
    if (index === null || !allStarDataProcessed[index]) { deselectStar(); return; }
    const star = allStarDataProcessed[index];
    const info = star.starInfo;
    const t = translations[currentLang];
    const year = document.getElementById('year-slider').value;
    const status = info.observation_flag === 'o' ? t.OBS_SAMARKAND : t.OBS_DERIVED;
    const name = info.names[currentLang] || info.names['en'];

    document.getElementById('selected-star-name').innerText = name;
    document.getElementById('selected-star-details').innerHTML = `
        <p><span class="font-semibold text-gray-300">${t.MAGNITUDE}:</span> ${info.magnitude.toFixed(2)}</p>
        <p><span class="font-semibold text-gray-300">${t.RA}:</span> ${info.ra.toFixed(2)}°</p>
        <p><span class="font-semibold text-gray-300">${t.DEC}:</span> ${info.dec.toFixed(2)}°</p>
        <p class="text-indigo-200 mt-1 font-bold">Uluğ Bey Kataloğu</p>
        <p><span class="font-semibold text-gray-300">İsim:</span> ${info.ubName}</p>
        <p><span class="font-semibold text-gray-300">Takımyıldız:</span> ${info.abb}</p>
        <p class="mt-1"><span class="font-semibold text-indigo-300">${t.STATUS}:</span> ${status}</p>
    `;
    document.getElementById('selected-star-container').classList.remove('hidden');
}

function checkIntersections() {
    const modalOpen = document.getElementById('infographic-modal').style.display === 'flex';
    if (!starPointsMesh || modalOpen) {
        if (intersectedStar !== null) resetStarColor(intersectedStar);
        return;
    }

    raycaster.setFromCamera(mouse, camera);
    const intersects = raycaster.intersectObject(starPointsMesh);
    const currentIdx = intersects.length > 0 ? intersects[0].index : null;

    if (intersectedStar !== null && intersectedStar !== currentIdx) resetStarColor(intersectedStar);

    if (currentIdx !== null) {
        if (intersectedStar !== currentIdx) {
            intersectedStar = currentIdx;
            const colors = starPointsMesh.geometry.attributes.color.array;
            const hc = new THREE.Color(HIGHLIGHT_COLOR);
            colors[currentIdx * 3] = hc.r;
            colors[currentIdx * 3 + 1] = hc.g;
            colors[currentIdx * 3 + 2] = hc.b;
            starPointsMesh.geometry.attributes.color.needsUpdate = true;
            updateTooltip(currentIdx);
        }
        const tt = document.getElementById('tooltip');
        tt.style.display = 'block';
        tt.style.left = mouseClientX + 12 + 'px';
        tt.style.top = mouseClientY + 12 + 'px';
    } else {
        document.getElementById('tooltip').style.display = 'none';
        intersectedStar = null;
    }
}

function resetStarColor(idx) {
    if (!allStarDataProcessed[idx]) return;
    const oldColor = allStarDataProcessed[idx].originalColor;
    const colors = starPointsMesh.geometry.attributes.color.array;
    colors[idx * 3] = oldColor.r;
    colors[idx * 3 + 1] = oldColor.g;
    colors[idx * 3 + 2] = oldColor.b;
    starPointsMesh.geometry.attributes.color.needsUpdate = true;
    document.getElementById('tooltip').style.display = 'none';
}

function updateTooltip(index) {
    const star = allStarDataProcessed[index];
    const info = star.starInfo;
    const t = translations[currentLang];
    const name = info.names[currentLang] || info.names['en'];
    const status = info.observation_flag === 'o' ? t.OBS_SAMARKAND : t.OBS_DERIVED;

    document.getElementById('tooltip').innerHTML = `
        <h4 class="font-bold text-yellow-300 mb-0.5">${name}</h4>
        <p>${t.MAGNITUDE}: ${info.magnitude.toFixed(2)}</p>
        <p>${t.RA}: ${info.ra.toFixed(1)}° | ${t.DEC}: ${info.dec.toFixed(1)}°</p>
        <p class="text-gray-400 text-xs">${info.ubName} | ${info.abb}</p>
        <p class="mt-0.5"><span class="font-semibold text-indigo-300">${t.STATUS}:</span> ${status}</p>
    `;
}

function onWindowResize() {
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
}

function animate() {
    requestAnimationFrame(animate);
    controls.update();
    checkIntersections();
    if (isAnimatingTime) celestialGroup.rotation.y += ROTATION_SPEED;
    renderer.render(scene, camera);
}

function updateUI() {
    const t = translations[currentLang];
    document.getElementById('title-main').innerText = t.TITLE_MAIN;

    if (modeBtn) { modeBtn.innerText = isUsturlabMode ? t.MOD_BUTTON_ASTROLABE : t.MOD_BUTTON_CATALOG; modeBtn.classList.toggle('active', isUsturlabMode); }
    const timeIcon = document.getElementById('time-icon');

    if (timeIcon && timeBtn) { timeIcon.innerText = isAnimatingTime ? t.TIME_ANIMATION_STOP : t.TIME_ANIMATION_START; timeBtn.classList.toggle('active', isAnimatingTime); }
    const labelBtn = document.getElementById('toggle-labels-button-icon');
    if (labelBtn) { labelBtn.innerText = showStarLabels ? t.SHOW_LABELS_ON : t.SHOW_LABELS_OFF; labelBtn.classList.toggle('active', showStarLabels); }
    const constBtn = document.getElementById('toggle-constellation-button-icon');
    if (constBtn) { constBtn.innerText = showConstellations ? t.CONSTELLATION_ON : t.CONSTELLATION_OFF; constBtn.classList.toggle('active', showConstellations); }

    document.getElementById('label-current-year').innerText = t.LABEL_CURRENT_YEAR;
    document.getElementById('info-raycast-hint').innerText = t.HINT_RAYCAST;
    document.getElementById('info-controls-hint').innerText = t.HINT_CONTROLS;
    document.getElementById('label-coords').innerText = t.LABEL_COORDS;

    document.querySelectorAll('.lang-button').forEach(b => b.classList.remove('active'));
    const lb = document.getElementById(`lang-${currentLang}`);
    if (lb) lb.classList.add('active');

    if (selectedStarIndex !== null) displaySelectedStarDetails(selectedStarIndex);
}

function drawZodiacLabels() {
    const existing = celestialGroup.children.filter(c => c.name && c.name.startsWith('ZodiacLabel_'));
    existing.forEach(l => celestialGroup.remove(l));
    if (!isUsturlabMode) return;

    const signs = translations[currentLang].ZODIAC_SIGNS;
    const r = CELESTIAL_RADIUS * 1.12;
    const color = new THREE.Color(0xffd700); // Bright gold/yellow

    for (let i = 0; i < 12; i++) {
        const lambda = i * 30 + 15;
        const eq = eclipticToEquatorial(lambda, 0, OBLIQUITY_1437);
        const pos = raDecToCartesian(eq.raDeg, eq.decDeg, r);
        const sprite = createTextSprite(signs[i], color, 38); // 32px for zodiac
        sprite.position.copy(pos);
        sprite.name = `ZodiacLabel_${i}`;
        celestialGroup.add(sprite);
    }
}

    // Register Service Worker for offline PWA support
    if ('serviceWorker' in navigator) {
        const swCode = `
            self.addEventListener('install', e => {
                e.waitUntil(self.skipWaiting());
            });
            self.addEventListener('activate', e => {
                e.waitUntil(self.clients.claim());
            });
            self.addEventListener('fetch', e => {
                e.respondWith(fetch(e.request).catch(() => new Response('Offline')));
            });
        `;
        const swBlob = new Blob([swCode], {type: 'application/javascript'});
        const swUrl = URL.createObjectURL(swBlob);
        navigator.serviceWorker.register(swUrl).then(() => {
            console.log('PWA Service Worker registered');
        }).catch(err => {
            console.log('SW registration failed:', err);
        });
    }
